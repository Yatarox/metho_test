version: "3.8"

services:
  calculator:
    build:
      context: ./calculator
    ports:
      - "8000:8000"
    restart: unless-stopped

  prometheus:
    build:
      context: ./prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin